info:
  title: Servicios Sociales API
  description: |-
    API de autenticación y gestión para instituciones de servicios sociales de El Salvador.
          
    **Instituciones soportadas:** ISSS, AFP, ISBM, IPSFA, INPEP

    **Autenticación:** JWT Bearer Token (RS256)

    **Roles disponibles:** super_admin, doctor, institution_staff, citizen

    **Credenciales de prueba:**
    - Super Admin: admin@ssapi.gob.sv / Admin123!
    - Ciudadanos: Usar datos generados en la tabla Citizen (ej. juan.perez@example.com)
  version: 1.0.0
  contact: {}
tags:
  - name: auth
    description: Autenticación y gestión de sesiones
  - name: oauth
    description: Autenticación OAuth2 (Google, Azure)
  - name: users
    description: Gestión de personal interno
  - name: roles
    description: Gestión de roles y permisos
  - name: affiliation
    description: Gestión de afiliaciones
  - name: contribution
    description: Gestión de contribuciones y pagos
  - name: medical-record
    description: Expedientes médicos (solo instituciones de salud)
  - name: audit
    description: Logs de auditoría
  - name: health
    description: Estado del sistema
servers: []
components:
  securitySchemes:
    JWT-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT
      description: Ingresa tu JWT access token
      in: header
  schemas:
    RegisterDto:
      type: object
      properties:
        email:
          type: string
          description: Correo electrónico principal
          format: email
        password:
          type: string
          description: Contraseña con requisitos de seguridad
          minLength: 8
          pattern: /((?=.*\d)|(?=.*\W+))(?![.\n])(?=.*[A-Z])(?=.*[a-z]).*$/
        firstName:
          type: string
          description: Nombres del usuario
        lastName:
          type: string
          description: Apellidos del usuario
        dui:
          type: string
          description: Documento Único de Identidad (Opcional)
          pattern: /^\d{8}-\d{1}$/
      required:
        - email
        - password
        - firstName
        - lastName
    LoginDto:
      type: object
      properties:
        email:
          type: string
          description: Correo institucional o administrativo
          format: email
        password:
          type: string
          description: Contraseña de acceso
          minLength: 8
        captchaToken:
          type: string
          description: Token de Google reCAPTCHA v3 (Invisible)
        captchaAnswer:
          type: string
          description: Respuesta del CAPTCHA visual (Letras)
        captchaId:
          type: string
          description: ID del CAPTCHA visual generado
      required:
        - email
        - password
    CitizenLoginDto:
      type: object
      properties:
        email:
          type: string
          description: Correo del ciudadano
          format: email
        affiliationNumber:
          type: string
          description: Número de carnet/afiliación
        password:
          type: string
          description: Contraseña del ciudadano
        captchaToken:
          type: string
          description: Token de Google reCAPTCHA v3 (Invisible)
        captchaAnswer:
          type: string
          description: Respuesta del CAPTCHA visual (Letras)
        captchaId:
          type: string
          description: ID del CAPTCHA visual generado
      required:
        - email
        - affiliationNumber
        - password
    VerifyOtpDto:
      type: object
      properties:
        email:
          type: string
          description: Correo del usuario a verificar
          format: email
        code:
          type: string
          description: Código OTP recibido por correo
      required:
        - email
        - code
    CreateAffiliationDto:
      type: object
      properties:
        citizenId:
          type: string
          description: ID del ciudadano relacionado
          format: uuid
        affiliationNumber:
          type: string
          description: Número correlativo de afiliación
        firstName:
          type: string
          description: Primer nombre
        lastName:
          type: string
          description: Primer apellido
        email:
          type: string
          description: Correo de contacto
        idNumber:
          type: string
          description: Número de DUI o Documento
        affiliationType:
          type: string
          description: 'Tipo de afiliación (ej: Trabajador Activo)'
        institutionType:
          type: string
          description: 'Institución (ej: ISSS, AFP)'
        employer:
          type: string
          description: Nombre del empleador
        employerTaxId:
          type: string
          description: NIT del empleador
        department:
          type: string
          description: Departamento de residencia
        observations:
          type: string
          description: Observaciones adicionales
      required:
        - affiliationType
        - institutionType
    CreateContributionDto:
      type: object
      properties:
        affiliationId:
          type: string
          description: ID de la afiliación relacionada
          format: uuid
        citizenId:
          type: string
          description: ID del ciudadano
          format: uuid
        period:
          type: string
          description: 'Período de la cotización (ej: 2024-03)'
        baseAmount:
          type: number
          description: Salario base reportado
        contributionAmount:
          type: number
          description: Monto de la contribución
        employer:
          type: string
          description: Nombre del empleador
        employerTaxId:
          type: string
          description: NIT del empleador
        status:
          type: string
          description: Estado del pago (paid, pending)
        paymentDate:
          format: date-time
          type: string
          description: Fecha de pago
      required:
        - affiliationId
        - citizenId
        - period
        - baseAmount
        - contributionAmount
        - employer
        - employerTaxId
